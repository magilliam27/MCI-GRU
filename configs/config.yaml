# Base configuration for MCI-GRU experiments
# Override values via command line or by including experiment configs

defaults:
  - data: sp500
  - features: with_momentum
  - _self_

# Model configuration
model:
  his_t: 10                    # Historical lookback (days)
  label_t: 5                   # Forward return period (days)
  gru_hidden_sizes: [32, 10]   # GRU hidden layer sizes
  hidden_size_gat1: 32         # First GAT hidden size
  output_gat1: 4               # First GAT output size
  gat_heads: 4                 # Number of GAT attention heads
  hidden_size_gat2: 32         # Second GAT hidden size
  num_hidden_states: 32        # Number of latent state vectors
  cross_attn_heads: 4          # Cross-attention heads
  slow_kernel: 5               # Multi-scale temporal kernel size
  slow_stride: 2               # Multi-scale temporal stride
  use_multi_scale: true        # false = plain ImprovedGRU (paper-faithful)
  use_self_attention: true     # Self-attention before final GAT (from original code)
  activation: elu              # elu or relu
  latent_init_scale: 0.02      # Latent state init std (original code used 1.0)

# Graph configuration
graph:
  judge_value: 0.8             # Correlation threshold for edges (used when top_k == 0)
  update_frequency_months: 0   # 0 = static, 6 = update every 6 months
  corr_lookback_days: 252      # Days for correlation computation
  top_k: 0                     # 0 = legacy global threshold; >0 = per-node top-K neighbours
  top_k_metric: corr           # corr | abs_corr (only when top_k > 0)
  use_multi_feature_edges: true   # true => (E,4) edge_attr; false => scalar (E,)

# Training configuration
training:
  batch_size: 32
  learning_rate: 5e-5
  num_epochs: 100
  num_models: 10               # Number of models for averaging
  early_stopping_patience: 10
  weight_decay: 1e-3            # L2 regularization
  gradient_clip: 1.0            # Max gradient norm
  loss_type: combined            # mse, ic, or combined
  ic_loss_alpha: 0.5           # Weight for IC component (only for combined)
  label_type: returns          # returns (raw) or rank (cross-sectional percentile)
  warmup_steps: 1000           # Linear LR warmup (optimizer steps) before cosine
  lr_scheduler: cosine         # cosine | none
  use_amp: true                # CUDA autocast + GradScaler (no-op on CPU)
  selection_metric: val_ic     # val_ic | val_loss — early stopping / checkpoint

# Local MLflow tracking (file store under tracking_uri)
tracking:
  enabled: true
  tracking_uri: mlruns
  experiment_name: null
  run_name: null
  log_artifacts: true
  log_checkpoints: true
  log_predictions: false

# Experiment metadata
experiment_name: baseline
output_dir: results
seed: 42

# Hydra configuration for output management
hydra:
  run:
    dir: ${output_dir}/${experiment_name}/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${output_dir}/${experiment_name}
    subdir: run_${hydra.job.num}
  job:
    chdir: false  # Don't change working directory
